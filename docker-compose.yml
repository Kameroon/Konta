services:
  gateway:
    build:
      context: .
      dockerfile: src/Konta.Gateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres
    depends_on:
      - postgres
      - identity
      - finance
    networks:
      - konta-network

  identity:
    build:
      context: .
      dockerfile: src/Konta.Identity/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres
    depends_on:
      - postgres
    networks:
      - konta-network

  finance:
    build:
      context: .
      dockerfile: src/Konta.Finance/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres
    depends_on:
      - postgres
    networks:
      - konta-network

  reporting:
    build:
      context: .
      dockerfile: src/Konta.Reporting/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres
    depends_on:
      - postgres
    networks:
      - konta-network

  ocr:
    build:
      context: .
      dockerfile: src/Konta.Ocr/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres
    depends_on:
      - postgres
    networks:
      - konta-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=konta_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - konta-network

networks:
  konta-network:
    driver: bridge

volumes:
  postgres_data:
