services:
  gateway:
    build:
      context: .
      dockerfile: src/Konta.Gateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres
    depends_on:
      - postgres
      - identity
      - tenant
      - finance

  identity:
    build:
      context: .
      dockerfile: src/Konta.Identity/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres

  tenant:
    build:
      context: .
      dockerfile: src/Konta.Tenant/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres

  billing:
    build:
      context: .
      dockerfile: src/Konta.Billing/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres

  finance:
    build:
      context: .
      dockerfile: src/Konta.Finance/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres

  finance-core:
    build:
      context: .
      dockerfile: src/Konta.Finance.Core/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres

  reporting:
    build:
      context: .
      dockerfile: src/Konta.Reporting/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres

  ocr:
    build:
      context: .
      dockerfile: src/Konta.Ocr/Dockerfile
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=konta_db;Username=postgres;Password=postgres

  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=konta_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
